# name: docker-compose.yml
# description: PostgreSQL 17 setup with healthchecks and data persistence.

services:
  database:
    image: postgres:17-alpine
    container_name: postgres-db
    restart: always
    environment:
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_DB=cinema_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U odoo" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  postgres_data:
    name: cinema_postgres_data

networks:
  app-network:
    driver: bridge
